<div class="chat-container">
  <div class="chat-header">
    <h1>Meguizo Class Ai chat</h1>
  </div>

  <div class="chat-messages" #messagesContainer>
    @for (message of messages(); track $index) {
      <div [ngClass]="message.sender === 'user' ? 'message user-message' : 'message bot-message'">
        @if (message.sender === 'user') {
          <p>{{ message.text }}</p>
        } @else {
          <div class="bot-markdown" [innerHTML]="renderBotMarkdown(message.text)"></div>
        }
      </div>
    }
    @if (isLoading()) {
      <div class="message bot-message loading">
        <div class="thinking-row">
          <span>{{ loadingLabel() }}</span>
          <span class="thinking-dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
        </div>
      </div>
    }
  </div>

  @if (error()) {
    <div class="error-message">
      {{ error() }}
    </div>
  }

  <div class="chat-input-area">
    <input
      type="text"
      [(ngModel)]="messageInput"
      (keyup.enter)="sendMessage()"
      [disabled]="isLoading()"
      placeholder="Type a message..."
      class="chat-input"
    />
    <button
      (click)="sendMessage()"
      [disabled]="isLoading() || !messageInput().trim()"
      class="send-button"
    >
      Send
    </button>
  </div>
</div>
